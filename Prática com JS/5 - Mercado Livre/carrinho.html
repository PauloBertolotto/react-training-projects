<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suas compras</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home/1-banner.css">
    <link rel="stylesheet" href="css/home/2-bonus.css">
    <link rel="stylesheet" href="css/home/3-ofertas.css">
    <link rel="stylesheet" href="css/home/4-Anuncio.css">
    <link rel="stylesheet" href="css/home/5-AnuncioStreaming.css">
    <link rel="stylesheet" href="css/home/6-beneficios.css">
    <link rel="stylesheet" href="css/compras/principal.css">


    <link rel="stylesheet" href="css/compras/principal.css">
    <link rel="stylesheet" href="css/carrinho.css">

    <script type="module" src="js/carrinhoPage.js" defer></script>


</head>

<body>
    <header>
        <div class="navbar">

            <div class="logo-cep">
                <div class="nav-logo">
                    <img src="img/logo.png" alt="Mercado Livre">
                </div>

                <div class="cep">
                    <a href="#">
                        <img src="img/localizacao-icon.png" alt="Localizar seu endereço">
                        <div>
                            <p>Informe seu </p>
                            <span>CEP</span>
                        </div>
                    </a>
                </div>
            </div>

            <div class="pesquisa-opcoes">

                <div class="nav-barraPesquisa">
                    <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
                    <button type="submit"><img src="img/lupa-busca.png" alt="Buscar produto"></button>
                </div>

                <div class="opcoes">

                    <select name="categoria" id="categoria">
                        <option value="">Categorias</option>
                        <option value="celular">Celular</option>
                        <option value="notebook">Notebook</option>
                        <option value="fone">Fone de ouvido</option>
                    </select>

                    <button><a href="#"></a>Ofertas</button>
                    <button><a href="#"></a>Cupons</button>
                    <button><a href="#"></a>Supermercado</button>
                    <button><a href="#"></a>Moda</button>
                    <button><a href="#"></a>Mercado Play</button>
                    <button><a href="#"></a>Vender</button>
                    <button><a href="#"></a>Contato</button>
                </div>
            </div>

            <div class="beneficio-login">

                <div class="nav-bar-beneficio">
                    <img src="img/meli+.webp" alt="Meli+ benefícios excluisivos">
                </div>

                <div class="login">
                    <a href="#" class="btn-login">Crie a sua conta</a>
                    <a href="#" class="btn-login">Entre</a>
                    <button type="button" class="btn-login" id="btn-compras">Compras</button>
                    <a href="#"><img src="img/carrinho.png" alt="Carrinho de compras" class="carrinho"></a>

                </div>
            </div>
        </div>
    </header>

    <main class="carrinho-container">
        <div id="carrinho-itens" class="carrinho-itens">
            <!-- Produtos serão inseridos aqui via JS -->
        </div>

        <div id="carrinho-total" class="carrinho-total">
            <!-- Total será inserido aqui via JS -->
        </div>

        <div class="carrinho-acoes">
            <a href="index.html" class="btn-voltar">← Voltar para a loja</a>
        </div>
    </main>

</body>

</html>
